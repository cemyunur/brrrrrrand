<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karanlık Takip - Organik Hayalet Aurası</title>
    <style>
        body { margin: 0; background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: 'Courier New', Courier, monospace; flex-direction: column; touch-action: none; overflow: hidden; }
        #gameContainer { position: relative; }
        canvas { background-color: #000; border: 2px solid #555; image-rendering: pixelated; max-width: 100%; max-height: 90vh; box-shadow: 0 0 30px rgba(255, 0, 0, 0.1); }
        #ui { position: absolute; top: 10px; left: 10px; font-size: 18px; font-weight: bold; color: #fff; z-index: 10; text-shadow: 2px 2px 0 #000; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        #startBtn { padding: 15px 30px; font-size: 24px; font-family: 'Courier New', Courier, monospace; background-color: #fff; color: #000; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="ui">SKOR: <span id="score">0</span></div>
        <div id="startScreen">
            <h2 style="color: red; margin-bottom: 30px; text-align: center;">ARKANA BAKMA...</h2>
            <button id="startBtn">KAÇIŞI BAŞLAT</button>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const karakterResmi = new Image(); karakterResmi.src = 'karakter.png'; 
        const kosanResmi = new Image(); kosanResmi.src = 'kosan.png';

        const engelResimleri = [];
        for(let i=1; i<=4; i++) { let img = new Image(); img.src = `engel_${i}.png`; engelResimleri.push(img); }

        const telefonResimleri = [];
        for(let i=1; i<=10; i++) { let img = new Image(); img.src = `telefon_${i}.png`; telefonResimleri.push(img); }

        let karakterSesi = null;
        try { karakterSesi = new Audio('ses.mp3'); karakterSesi.loop = true; } catch(e) {}

        const VPx = canvas.width / 2; const VPy = 200; const maxDepth = 100;         
        let score = 0; let gameActive = false; let roadOffset = 0;
        let player = { x: 0, depth: 15, speed: 7 }; 
        let monsterDepth = 90; let obstacles = []; let frameCount = 0;
        let phones = []; 
        let gameStartTime = 0;

        let keys = { ArrowLeft: false, ArrowRight: false };
        window.addEventListener("keydown", (e) => { if(keys[e.code] !== undefined) keys[e.code] = true; });
        window.addEventListener("keyup", (e) => { if(keys[e.code] !== undefined) keys[e.code] = false; });

        function handleInputStart(clientX, clientY) {
            let rect = canvas.getBoundingClientRect();
            let x = (clientX - rect.left) * (canvas.width / rect.width);
            let y = (clientY - rect.top) * (canvas.height / rect.height);
            let clickedOnPhone = false;
            
            for (let i = phones.length - 1; i >= 0; i--) {
                let p = phones[i];
                if (x > p.x && x < p.x + p.w && y > p.y && y < p.y + p.h) {
                    p.clicks++; 
                    if (p.clicks >= 2) { phones.splice(i, 1); score += 50; }
                    clickedOnPhone = true; break;
                }
            }
            if (clickedOnPhone) return;
            if (x < canvas.width / 2) { keys.ArrowLeft = true; keys.ArrowRight = false; }
            else { keys.ArrowRight = true; keys.ArrowLeft = false; }
        }

        canvas.addEventListener("mousedown", (e) => handleInputStart(e.clientX, e.clientY));
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleInputStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener("mouseup", () => { keys.ArrowLeft = false; keys.ArrowRight = false; });
        window.addEventListener("touchend", () => { keys.ArrowLeft = false; keys.ArrowRight = false; });

        document.getElementById("startBtn").addEventListener("click", () => {
            document.getElementById("startScreen").style.display = "none";
            try {
                if (karakterSesi) { karakterSesi.volume = 0.1; let p = karakterSesi.play(); if(p) p.catch(e=>{}); }
            } catch(e) {}
            gameActive = true;
            gameStartTime = Date.now();
            gameLoop();
        });

        function project(x, depth) {
            let ratio = 1 - (depth / maxDepth);
            let scale = ratio * ratio; 
            return { x: VPx + (x * scale), y: VPy + (canvas.height - VPy) * scale, scale: scale };
        }

        function spawnObstacle() {
            let lanes = [-150, 0, 150]; 
            obstacles.push({ x: lanes[Math.floor(Math.random() * lanes.length)], depth: -45, passed: false, type: Math.floor(Math.random() * 4) });
        }

        function update() {
            if (!gameActive) return;
            let diff = 1 + (Math.floor(score / 200) * 0.05);
            
            if (keys.ArrowLeft && player.x > -180) player.x -= player.speed;
            if (keys.ArrowRight && player.x < 180) player.x += player.speed;
            
            roadOffset += 1.2 * diff; if (roadOffset > 10) roadOffset -= 10;
            
            frameCount++;
            if (frameCount % Math.max(25, Math.floor(60 / diff)) === 0) spawnObstacle();

            let timeElapsed = (Date.now() - gameStartTime) / 1000;
            if (timeElapsed > 3 && Math.random() < 0.002) { 
                phones.push({ x: Math.random() * (canvas.width - 130), y: 40 + Math.random() * (canvas.height - 300), w: 120, h: 220, clicks: 0, imgIndex: Math.floor(Math.random() * 10) });
            }

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i]; obs.depth += 1.1 * diff; 
                
                if (Math.abs(obs.depth - player.depth) < 5 && Math.abs(obs.x - player.x) < 40 && !obs.passed) { 
                    obs.passed = true; monsterDepth -= 15; 
                    canvas.style.transform = `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
                    setTimeout(() => canvas.style.transform = "translate(0,0)", 100);
                }
                if (obs.depth > player.depth + 5 && !obs.passed) { obs.passed = true; score += 10; document.getElementById("score").innerText = score; }
                if (obs.depth >= maxDepth) { obstacles.splice(i, 1); i--; }
            }

            if (karakterSesi) {
                try {
                    let danger = 1 - (Math.max(0, monsterDepth - player.depth) / 75);
                    karakterSesi.volume = Math.max(0, Math.min(1, 0.1 + (danger * 0.9)));
                    karakterSesi.playbackRate = Math.max(0.5, Math.min(2.0, 1.0 + (danger * 0.8)));
                } catch(e) {}
            }

            if (monsterDepth <= player.depth + 5) {
                gameActive = false; if(karakterSesi) karakterSesi.pause();
                setTimeout(() => alert("YAKALANDIN!\nSkor: " + score + "\nYeniden oynamak için sayfayı yenile."), 100);
            }
        }

        function draw() {
            let danger = 1 - (Math.max(0, monsterDepth - player.depth) / 75);
            ctx.fillStyle = `rgb(${Math.floor(danger * 80)}, 0, 0)`; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.beginPath();
            ctx.moveTo(0, VPy); ctx.lineTo(canvas.width, VPy); ctx.stroke();

            for (let d = roadOffset; d < maxDepth; d += 10) {
                let p1 = project(-350, d); let p2 = project(350, d);
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            }

            let mP = project(0, monsterDepth);
            let mSize = 400 * mP.scale; let mHeight = 400 * mP.scale; 
            let kX = mP.x - mSize/2; let kY = mP.y - mHeight * 0.8;

            // 1. ORGANİK HAYALET AURA (Yumuşak duman/dağılma efekti)
            if (danger > 0.05) {
                // Daha büyük, daha az sayıda parçacık ile duman hissi
                let pCount = Math.floor(150 * danger);
                
                for(let p = 0; p < pCount; p++) {
                    // Merkezden rastgele bir sapma hesapla (X ve Y düzleminde)
                    let offsetX = (Math.random() - 0.5) * (mSize * 2.0);
                    let offsetY = (Math.random() - 0.5) * (mHeight * 1.5);
                    
                    let pX = kX + mSize/2 + offsetX;
                    let pY = kY + mHeight/2 + offsetY;
                    
                    // Merkezden ne kadar uzaklaşıldığını bul (0 ile 1 arası oran)
                    let distRatio = Math.sqrt(offsetX*offsetX + offsetY*offsetY) / mSize;
                    
                    // Uzağa gittikçe şeffaflığı (alpha) azalt. Merkezdekiler koyu siyah, kenardakiler silik olsun
                    let alpha = Math.max(0, 1 - distRatio) * danger;
                    
                    // Parçacık boyutu
                    let pR = (Math.random() * 60 + 30) * mP.scale;
                    
                    ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
                    ctx.beginPath();
                    // ctx.ellipse ile yukarı doğru süzülen dumanlar/tüller çiziyoruz
                    ctx.ellipse(pX, pY, pR, pR * (1 + Math.random()*1.5), 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 2. KOVALAYAN
            if (karakterResmi.complete && karakterResmi.naturalWidth !== 0) {
                let sX = (Math.random()*4-2)*danger; let sY = (Math.random()*4-2)*danger;
                ctx.drawImage(karakterResmi, kX + sX, kY + sY, mSize, mHeight);
            }

            // ENGELLER
            obstacles.forEach(obs => {
                if (obs.depth < 0) {
                    if (frameCount % 16 < 8) { 
                        let wP = project(obs.x, 5); ctx.fillStyle = "red"; ctx.font = "bold 35px 'Courier New'"; ctx.textAlign = "center"; ctx.fillText("!", wP.x, canvas.height - 40);
                    }
                } else {
                    let oP = project(obs.x, obs.depth);
                    let oSize = 80 * oP.scale; 
                    let img = engelResimleri[obs.type];
                    if(img && img.complete && img.naturalWidth !== 0) {
                        ctx.drawImage(img, oP.x - oSize/2, oP.y - oSize, oSize, oSize);
                    } else {
                        ctx.strokeStyle = "red"; ctx.strokeRect(oP.x - oSize/2, oP.y - oSize, oSize, oSize);
                    }
                }
            });

            // OYUNCU
            let pP = project(player.x, player.depth);
            let pW = 80 * pP.scale; let pH = 80 * pP.scale;
            if (kosanResmi.complete && kosanResmi.naturalWidth !== 0) {
                ctx.drawImage(kosanResmi, pP.x - pW/2, pP.y - pH + (10*pP.scale), pW, pH);
            }

            // TELEFONLAR
            phones.forEach(p => {
                ctx.fillStyle = "#222"; ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = "#666"; ctx.lineWidth = 3; ctx.strokeRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = "#111"; ctx.fillRect(p.x + p.w/2 - 15, p.y + 5, 30, 8);
                
                let sX = p.x + 5, sY = p.y + 20, sW = p.w - 10, sH = p.h - 25;
                ctx.fillStyle = "#000"; ctx.fillRect(sX, sY, sW, sH);
                
                let currentImg = telefonResimleri[p.imgIndex];
                if (currentImg && currentImg.complete && currentImg.naturalWidth !== 0) {
                    ctx.drawImage(currentImg, sX, sY, sW, sH - 45);
                } else {
                    ctx.fillStyle = "#333"; ctx.fillRect(sX, sY, sW, sH - 45);
                }
                
                let bY = sY + sH - 40;
                let bCol = p.clicks === 1 ? "#ff0" : "#fff";
                ctx.strokeStyle = bCol; ctx.strokeRect(sX + 5, bY, sW - 10, 35);
                if (p.clicks === 1 && frameCount % 10 < 5) { ctx.fillStyle = bCol; ctx.fillRect(sX + 5, bY, sW - 10, 35); }
                
                ctx.fillStyle = (p.clicks === 1 && frameCount % 10 < 5) ? "#000" : bCol;
                ctx.font = "bold 14px 'Courier New'"; ctx.textAlign = "center"; 
                ctx.fillText(p.clicks === 0 ? "LIKE <3" : "1 DAHA!", sX + sW/2, bY + 22);
            });
        }

        function gameLoop() { update(); draw(); if(gameActive) requestAnimationFrame(gameLoop); }
    </script>
</body>
</html>
